<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box}</style>
</helmet>
<aside style="--f:'Hanken Grotesk',system-ui,sans-serif;--brand:#5A55D6;--brand-700:#3F39A8;--brand-100:#ECEAFB;--ink:#181621;--ink-2:#45424F;--muted:#76727F;--faint:#A9A5B5;--line:#E7E5EE;--line-2:#F0EFF5;--surface:#FFFFFF;--surface-2:#F8F8FB;--e1:0 1px 2px rgba(24,22,40,.06);font-family:var(--f);height:100%;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;gap:5px;">
  <button style="display:flex;align-items:center;gap:11px;padding:10px;border:1px solid var(--line);background:var(--surface);border-radius:12px;cursor:pointer;text-align:left;width:100%;box-shadow:var(--e1);">
    <img src="assets/yuzuview-mark.png" style="width:30px;height:30px;object-fit:contain;flex:none;" />
    <span style="display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;"><span style="font:700 13px/1.1 var(--f);color:var(--ink);">Acme Lighting</span><span style="font:600 11px/1 var(--f);color:var(--muted);">Growth plan</span></span>
    <span style="color:var(--faint);font-size:11px;">▾</span>
  </button>
  <div style="height:1px;background:var(--line-2);margin:8px 2px;"></div>

  <a style="{{ sOverview }}"><span style="{{ iOverview }}"></span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Overview</a>
  <a style="{{ sStudio }}"><span style="{{ iStudio }}"></span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 19.5 9 13l3 3 6.5-6.5"/><circle cx="8" cy="8" r="2"/><rect x="2.5" y="3.5" width="19" height="17" rx="3"/></svg>Studio</a>
  <a style="{{ sGenerations }}"><span style="{{ iGenerations }}"></span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>Generations<span style="margin-left:auto;font:700 10px/1 var(--f);color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);padding:3px 7px;border-radius:999px;">12</span></a>
  <a style="{{ sProducts }}"><span style="{{ iProducts }}"></span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4-9 4-9-4Z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>Products<span style="margin-left:auto;font:700 10px/1 var(--f);color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);padding:3px 7px;border-radius:999px;">48</span></a>
  <a style="{{ sAnalytics }}"><span style="{{ iAnalytics }}"></span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16l4-5 3 3 4-6"/></svg>Analytics</a>

  <div style="font:700 10px/1 var(--f);letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:16px 11px 7px;">Configure</div>
  <a style="{{ sScript }}"><span style="{{ iScript }}"></span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7 4 12l5 5"/><path d="M15 7l5 5-5 5"/></svg>Script &amp; install</a>
  <a style="{{ sWidget }}"><span style="{{ iWidget }}"></span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/><circle cx="12" cy="12" r="3.2"/></svg>Widget settings</a>
  <a style="{{ sBilling }}"><span style="{{ iBilling }}"></span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5" width="19" height="14" rx="3"/><path d="M2.5 9.5h19"/></svg>Credits &amp; billing</a>
  <a style="{{ sSettings }}"><span style="{{ iSettings }}"></span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a7.5 7.5 0 0 0 0-3l1.7-1.3-1.8-3.1-2 .8a7.5 7.5 0 0 0-2.6-1.5L14.3 2h-3.6l-.4 2.4a7.5 7.5 0 0 0-2.6 1.5l-2-.8L3.9 8.2l1.7 1.3a7.5 7.5 0 0 0 0 3l-1.7 1.3 1.8 3.1 2-.8a7.5 7.5 0 0 0 2.6 1.5l.4 2.4h3.6l.4-2.4a7.5 7.5 0 0 0 2.6-1.5l2 .8 1.8-3.1Z"/></svg>Settings</a>

  <div style="margin-top:auto;display:flex;flex-direction:column;gap:12px;">
    <div style="border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:9px;background:var(--surface-2);">
      <div style="display:flex;align-items:center;justify-content:space-between;"><span style="font:600 11px/1 var(--f);letter-spacing:.06em;text-transform:uppercase;color:var(--muted);">Credits left</span><span style="font:700 11px/1 var(--f);color:var(--brand-700);background:var(--brand-100);padding:3px 7px;border-radius:6px;">38% used</span></div>
      <div style="font:700 22px/1 var(--f);letter-spacing:-.01em;font-variant-numeric:tabular-nums;color:var(--ink);">742 <span style="font:600 13px/1 var(--f);color:var(--muted);">/ 1,200</span></div>
      <div style="height:7px;border-radius:7px;background:#E4E2EC;overflow:hidden;"><div style="width:38%;height:100%;background:var(--brand);border-radius:7px;"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:6px 4px;"><span style="width:32px;height:32px;border-radius:50%;background:var(--brand);color:#fff;font:700 12px/1 var(--f);display:flex;align-items:center;justify-content:center;flex:none;">AM</span><span style="display:flex;flex-direction:column;min-width:0;"><span style="font:600 13px/1.2 var(--f);color:var(--ink);">Alex Marin</span><span style="font:500 11px/1.2 var(--f);color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">alex@acmelighting.com</span></span></div>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:264,&quot;height&quot;:700},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;overview&quot;,&quot;studio&quot;,&quot;generations&quot;,&quot;products&quot;,&quot;analytics&quot;,&quot;script&quot;,&quot;widget&quot;,&quot;billing&quot;,&quot;settings&quot;],&quot;default&quot;:&quot;overview&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const a = this.props.active || 'overview';
    const on = 'display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;background:var(--brand-100);color:var(--brand-700);font:600 13.5px/1 var(--f);text-decoration:none;position:relative;';
    const off = 'display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:var(--ink-2);font:600 13.5px/1 var(--f);text-decoration:none;position:relative;';
    const indOn = 'position:absolute;left:-14px;top:8px;bottom:8px;width:3px;background:var(--brand);border-radius:3px;display:block;';
    const indOff = 'display:none;';
    const keys = ['overview','studio','generations','products','analytics','script','widget','billing','settings'];
    const out = {};
    const cap = {overview:'Overview',studio:'Studio',generations:'Generations',products:'Products',analytics:'Analytics',script:'Script',widget:'Widget',billing:'Billing',settings:'Settings'};
    keys.forEach(k=>{ out['s'+cap[k]] = a===k?on:off; out['i'+cap[k]] = a===k?indOn:indOff; });
    return out;
  }
}
</script>
</body>
</html>
