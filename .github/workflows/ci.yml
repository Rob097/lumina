name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · typecheck · build · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Point @lumina/db integration tests at the service container instead of Testcontainers.
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Builds the deployable widget app bundle (separate from the consumable preview lib that `build`
      # emits) — build.mjs enforces the < 45 KB gzip budget inline and fails if exceeded.
      - name: Widget bundle budget (< 45 KB gz)
        run: pnpm -F @lumina/widget build:bundle

      # The db + api integration suites share the single CI Postgres service. `turbo run test` would
      # run those package test tasks in parallel, so two processes apply the migrations to the same DB
      # at once and race on DDL (duplicate pg_type / "tuple concurrently updated"). Serialize the task
      # graph on CI. Locally each package gets its own Testcontainers DB, so dev `pnpm test` stays parallel.
      - name: Test
        run: pnpm test -- --concurrency=1

  migrate:
    name: DB migrations (master only)
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Drizzle migrations are idempotent (journaled); applies only new ones. Uses the Supabase
      # SESSION pooler (port 5432) — the transaction pooler breaks the migrator's prepared statements.
      - name: Apply Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate
